<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Neptune — Mansingh Inn</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #07111f; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  #topnav {
    width: 100%; background: #0d1e35; border-bottom: 3px solid #f0c040;
    display: flex; flex-shrink: 0; box-shadow: 0 4px 20px rgba(0,0,0,.6);
  }
  #topnav button {
    flex: 1; padding: 13px 8px 11px; background: transparent; border: none;
    border-bottom: 4px solid transparent; color: rgba(255,255,255,.5);
    cursor: pointer; font-size: 13px; font-weight: 700; font-family: sans-serif;
    display: flex; flex-direction: column; align-items: center; gap: 3px; transition: all .2s;
  }
  #topnav button:hover { background: rgba(240,192,64,.08); color: #fff; }
  #topnav button.active { color: #f0c040; background: rgba(240,192,64,.1); border-bottom: 4px solid #f0c040; }
  .sep { width: 1px; background: rgba(240,192,64,.2); margin: 8px 0; }
  .nav-icon { font-size: 22px; line-height: 1; }
  .nav-lbl  { font-size: 11px; }
  #frame-wrap { flex: 1; position: relative; overflow: hidden; }
  iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; }
  iframe.active { display: block; }
</style>
</head>
<body>

<div id="topnav">
  <button class="active" id="btn1" onclick="switchTo(1)">
    <span class="nav-icon">&#127968;</span>
    <span class="nav-lbl">Hotel Neptune</span>
  </button>
  <div class="sep"></div>
  <button id="btn2" onclick="switchTo(2)">
    <span class="nav-icon">&#129522;</span>
    <span class="nav-lbl">Calculator</span>
  </button>
  <div class="sep"></div>
  <button id="btn3" onclick="switchTo(3)">
    <span class="nav-icon">&#128444;</span>
    <span class="nav-lbl">Img &#8594; Text</span>
  </button>
</div>

<div id="frame-wrap">
  <iframe id="f1" class="active" src="index.html"></iframe>
  <iframe id="f2" src="calci page 2.html"></iframe>
  <iframe id="f3" src="text extractor page 3.html"></iframe>
</div>

<script>
  function switchTo(n) {
    [1,2,3].forEach(function(i){
      document.getElementById('f'+i).classList.toggle('active', i===n);
      document.getElementById('btn'+i).classList.toggle('active', i===n);
    });
  }
</script>
</body>
</html>
